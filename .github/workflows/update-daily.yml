name: 매일 이벤트 GIF 자동 업데이트

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update-gif:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python 및 Pillow 설치
        run: pip install Pillow

      - name: GIF 생성
        run: |
          TOMORROW=$(TZ=Asia/Seoul date -d "today" +"%m %d")
          MONTH=$(echo $TOMORROW | awk '{print int($1)}')
          DAY=$(echo $TOMORROW | awk '{print int($2)}')
          START_DATE=$(TZ=Asia/Seoul date -d "today -6 days" +"%Y-%m-%d")
          SM=$(date -d "$START_DATE" +"%m" | sed 's/^0//')
          SD=$(date -d "$START_DATE" +"%d" | sed 's/^0//')
          python3 actions_generate.py $SM $SD $MONTH $DAY

      - name: Git push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "자동 업데이트: $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push

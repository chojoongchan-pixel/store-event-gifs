name: 매일 이벤트 GIF 자동 업데이트

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 한국시간 자정 (UTC 15시)
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  update-gif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pillow 설치
        run: pip install Pillow

      - name: 한글 폰트 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: GIF 생성
        run: |
          cd $GITHUB_WORKSPACE
          TOMORROW=$(TZ=Asia/Seoul date -d "+1 day" +"%m %d")
          MONTH=$(echo $TOMORROW | awk '{print int($1)}')
          DAY=$(echo $TOMORROW | awk '{print int($2)}')
          END_DATE=$(TZ=Asia/Seoul date -d "+1 day" +"%Y-%m-%d")
          START_DATE=$(TZ=Asia/Seoul date -d "+1 day -6 days" +"%Y-%m-%d")
          SM=$(date -d "$START_DATE" +"%m" | sed 's/^0//')
          SD=$(date -d "$START_DATE" +"%d" | sed 's/^0//')
          EM=$MONTH
          ED=$DAY
          python3 actions_generate.py $SM $SD $EM $ED

      - name: Git push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "자동 업데이트: $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push

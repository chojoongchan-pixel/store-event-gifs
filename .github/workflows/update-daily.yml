name: update-gifs

on:
  workflow_dispatch:

jobs:
  update-gif:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: install
        run: pip install Pillow

      - name: generate
        run: |
          TOMORROW=$(TZ=Asia/Seoul date -d "+1 day" +"%m %d")
          MONTH=$(echo $TOMORROW | awk '{print int($1)}')
          DAY=$(echo $TOMORROW | awk '{print int($2)}')
          START_DATE=$(TZ=Asia/Seoul date -d "+1 day -6 days" +"%Y-%m-%d")
          SM=$(date -d "$START_DATE" +"%m" | sed 's/^0//')
          SD=$(date -d "$START_DATE" +"%d" | sed 's/^0//')
          python3 actions_generate.py $SM $SD $MONTH $DAY

      - name: push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "auto-update"
          git pull --rebase origin main
          git push
